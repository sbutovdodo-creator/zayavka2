<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчёт</title>

<style>
body {
    font-family: Arial;
    background:#e5e7eb;
    padding:10px;
}

.container {
    max-width:600px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    font-size:16px;
    box-sizing: border-box;
}

button {
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
position: sticky;
    bottom: 10px;
}

.autocomplete {
    position:relative;
}

.dropdown {
    position:absolute;
    width:100%;
    background:white;
    border:1px solid #ccc;
    max-height:150px;
    overflow-y:auto;
    display:none;
    z-index:10;
}

.dropdown div {
    padding:8px;
    cursor:pointer;
}
.dropdown div:hover {
    background:#eee;
}

.checkbox-row {
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
}
.checkbox-row input {
    width: auto;
    margin: 0;
}

.checkbox-row label {
    margin: 0;
}
@media (max-width: 600px) {

.container {
    padding: 10px;
}

/* делаем строки работ вертикальными */
.work-row {
    flex-direction: column;
    align-items: stretch;
}

/* поля растягиваются */
.work-row .autocomplete,
.qty,
.price,
.remove-btn {
    width: 100%;
}

/* кнопку удалить делаем большой */
.remove-btn {
    height: 45px;
}

/* чекбокс */
.checkbox-row {
    justify-content: flex-start;
}

}

/* ===== РАБОТЫ ===== */

.work-row {
    display:flex;
    gap:8px;
    margin-bottom:8px;
    align-items:center;
}

.work-row .autocomplete {
    flex:1;
}

.work-row .autocomplete input {
    width:100%;
}

.qty {
    width:80px;
    text-align:center;
}

.price {
    width:70px;
    text-align:center;
}

.remove-btn {
    width:40px;
    height:40px;
    background:red;
    color:white;
    border:none;
}

.total {
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}
.switch-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
}

.switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #ccc;
    border-radius: 34px;
    cursor: pointer;
    transition: 0.3s;
}

.slider:before {
    content: "";
    position: absolute;
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

.switch input:checked + .slider {
    background: #2563eb;
}

.switch input:checked + .slider:before {
    transform: translateX(22px);
}
</style>
</head>

<body>

<div class="container">

<h2>Отчёт</h2>

<!-- ТОЧКА -->
<label>Точка</label>
<div class="autocomplete">
    <input id="pointInput" placeholder="Начни вводить...">
    <div id="pointDropdown" class="dropdown"></div>
</div>

<!-- ССЫЛКА -->
<label>Ссылка</label>
<input id="link">

<!-- ТИП -->
<label>Тип заявки</label>
<select id="type">
    <option>Плановая</option>
    <option>Срочная</option>
    <option>Аварийная</option>
</select>

<!-- НОЧНЫЕ -->
<div class="switch-row">
    <label class="switch">
        <input type="checkbox" id="night">
        <span class="slider"></span>
    </label>
    <span>Ночные работы</span></div>

<!-- РАБОТЫ -->
<h3>Работы</h3>
<div id="works"></div>
<button onclick="addWork()">+ Добавить работу</button>

<div class="total">Итого: <span id="total">0</span> руб</div>

<!-- МАТЕРИАЛЫ -->
<h3>Материалы</h3>
<input id="materials" placeholder="Что закупали">

<label>Бутов</label>
<input type="number" id="butov">

<label>Лысенко</label>
<input type="number" id="lysenko">

<label>Рик-Лаб</label>
<input type="number" id="rik">

<label>Свои</label>
<input type="number" id="self">

<label>Парковка</label>
<input type="number" id="parking">

<!-- СОТРУДНИК -->
<h3>Кто выполнил</h3>
<select id="worker">
<option>Пахомов Александр</option>
<option>Холдоров Акрам</option>
<option>Эсанов Бахром</option>
<option>Эсанбоев Анвар</option>
<option>Фефелов Сергей</option>
<option>Давыдов Алексей</option>
</select>

<button onclick="save()">СОХРАНИТЬ</button>

</div>

<script>

// ===== ЗАГРУЗКА ДАННЫХ =====
const API_URL = "https://script.google.com/macros/s/AKfycbxUaA4z8KHNeKpBKt6Slprwcp0j99OWNK20-1-aZwQr6RIB6DU5a2TZ77eb7FmycxdWRg/exec";

let points = [];
let priceList = {};

let departure = {};

Promise.all([
  fetch(API_URL + "?sheet=points").then(r => r.json()),
  fetch(API_URL + "?sheet=price").then(r => r.json()),
  fetch(API_URL + "?sheet=departure").then(r => r.json())
])
.then(function(data){

  const pointsData = data[0];
  const priceData = data[1];
  const departureData = data[2];

  // точки
  points = pointsData.map(p => p.name);

  // прайс
  priceData.forEach(row => {
    priceList[row.name] = Number(row.price);
  });

  // выезды
  departureData.forEach(row => {
    departure[row.name] = {
      planned: Number(row.planned),
      urgent: Number(row.urgent),
      emergency: Number(row.emergency)
    };
  });

  console.log("Данные загружены");
});.then(function(data){

  const pointsData = data[0];
  const priceData = data[1];

  points = pointsData.map(function(p){
    return p.name;
  });

  priceData.forEach(function(row){
    priceList[row.name] = Number(row.price);
  });

  console.log("Данные загружены");

});
// ===== АВТОКОМПЛИТ ТОЧЕК =====
const pointInput = document.getElementById("pointInput");
const pointDrop = document.getElementById("pointDropdown");

pointInput.oninput = () => {
const val = pointInput.value.toLowerCase();
pointDrop.innerHTML = "";

if (!val) {
    pointDrop.style.display = "none";
    return;
}

points
.filter(p => p.toLowerCase().includes(val))
.forEach(p => {
    const div = document.createElement("div");
    div.innerText = p;
    div.onclick = () => {
        pointInput.value = p;
        pointDrop.style.display = "none";
    };
    pointDrop.appendChild(div);
});

pointDrop.style.display = "block";
};

// ===== ДОБАВЛЕНИЕ РАБОТЫ =====
function addWork() {

const div = document.createElement('div');
div.className = 'work-row';

div.innerHTML = `
<div class="autocomplete">
    <input placeholder="Работа...">
    <div class="dropdown"></div>
</div>
<input type="number" class="qty" value="1">
<div class="price">0</div>
<button class="remove-btn">X</button>
`;

document.getElementById('works').appendChild(div);

const inp = div.querySelector("input");
const drop = div.querySelector(".dropdown");

inp.oninput = () => {
const val = inp.value.toLowerCase();
drop.innerHTML = "";

Object.keys(priceList)
.filter(i => i.toLowerCase().includes(val))
.forEach(i => {
    const d = document.createElement("div");
    d.innerText = i;
    d.onclick = () => {
        inp.value = i;
        drop.style.display = "none";
        div.querySelector(".price").innerText = priceList[i];
        calc();
    };
    drop.appendChild(d);
});

drop.style.display = "block";
};

div.querySelector(".qty").oninput = calc;

div.querySelector(".remove-btn").onclick = () => {
    div.remove();
    calc();
};

}

// ===== РАСЧЁТ =====
function calc() {

let total = 0;

document.querySelectorAll(".work-row").forEach(r => {
    const q = r.querySelector(".qty").value || 0;
    const p = r.querySelector(".price").innerText || 0;
    total += q * p;
});

document.getElementById("total").innerText = total;

}
function getDeparturePrice() {

  const point = document.getElementById("pointInput").value;
  const type = document.getElementById("type").value;

  if (!departure[point]) return 0;

  if (type === "Плановая") return departure[point].planned;
  if (type === "Срочная") return departure[point].urgent;
  if (type === "Аварийная") return departure[point].emergency;

  return 0;
}
// ===== СОХРАНЕНИЕ =====
function save() {
const pointValue = document.getElementById("pointInput").value;

if (!points.includes(pointValue)) {
    alert("Выбери точку из списка");
    return;
}
let invalidWork = false;

document.querySelectorAll(".work-row").forEach(r => {
    const workName = r.querySelector("input").value;

    if (!priceList[workName]) {
        invalidWork = true;
    }
});

if (invalidWork) {
    alert("Есть работы не из списка");
    return;
}
const data = {
point: pointInput.value,
link: document.getElementById("link").value,
type: document.getElementById("type").value,
night: document.getElementById("night").checked,
worker: document.getElementById("worker").value,

departure: departurePrice, // 👈 ВОТ ЭТОЙ СТРОКИ НЕ ХВАТАЕТ

materials: document.getElementById("materials").value,
butov: document.getElementById("butov").value,
lysenko: document.getElementById("lysenko").value,
rik: document.getElementById("rik").value,
self: document.getElementById("self").value,
parking: document.getElementById("parking").value,

total: document.getElementById("total").innerText
};
console.log(data);
alert("Сохранено (пока в консоль)");

}

</script>

</body>
</html>
